name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      # Last line of defense: blogscan's own redaction already scrubs
      # secrets before content is drafted, but this catches copy/paste
      # mistakes made while hand-editing a post before it's committed.
      - name: Scan build output for obvious secrets
        run: |
          set -e
          PATTERN='AIza[0-9A-Za-z_-]{35}|sk-[A-Za-z0-9]{20,}|gh[pousr]_[A-Za-z0-9]{36,}|-----BEGIN[ A-Z]*PRIVATE KEY-----'
          if grep -RIEn "$PATTERN" dist/ ; then
            echo "::error::Potential secret found in build output (dist/). Failing the deploy."
            exit 1
          fi
          echo "No obvious secrets found in dist/."

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
